version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: form_builder_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    container_name: form_builder_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-formbuilder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: form_builder_backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-formbuilder}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: >
      sh -c "npx prisma migrate deploy && npm run prisma:seed && npm start"

  worker:
    build:
      context: ./backend
    container_name: form_builder_worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-formbuilder}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET} # May be needed for API calls from worker
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: npm run worker

  frontend:
    build:
      context: ./form-workflow-builder
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: form_builder_frontend
    ports:
      - "5173:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local